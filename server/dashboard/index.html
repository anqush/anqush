<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anqush</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      line-height: 1.5;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    header {
      display: flex; justify-content: space-between; align-items: center;
      padding-bottom: 1.5rem; border-bottom: 1px solid #333;
      margin-bottom: 2rem;
    }
    h1 { font-size: 1.5rem; font-weight: 600; color: #fff; }
    .badge {
      background: #1a1a1a; border: 1px solid #333;
      padding: 0.25rem 0.75rem; border-radius: 999px;
      font-size: 0.75rem; color: #888;
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
    .card {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 8px; padding: 1.25rem;
    }
    .card h2 { font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em; color: #888; margin-bottom: 0.75rem; }
    .metric { font-size: 2rem; font-weight: 700; color: #fff; }
    .metric-label { font-size: 0.75rem; color: #666; margin-top: 0.25rem; }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 0.5rem; }
    .status-active { background: #22c55e; }
    .status-blocked { background: #ef4444; }
    .status-pending { background: #f59e0b; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { text-align: left; padding: 0.75rem; font-size: 0.875rem; }
    th { color: #888; font-weight: 500; border-bottom: 1px solid #333; }
    td { border-bottom: 1px solid #222; }
    .mono { font-family: 'SF Mono', Monaco, monospace; font-size: 0.8rem; }
    .btn {
      background: #2563eb; color: #fff; border: none;
      padding: 0.5rem 1rem; border-radius: 6px;
      font-size: 0.875rem; cursor: pointer;
    }
    .btn:hover { background: #1d4ed8; }
    .btn-outline {
      background: transparent; border: 1px solid #444;
      color: #ccc;
    }
    .btn-outline:hover { border-color: #666; }
    .section { margin-top: 2rem; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .empty { color: #555; font-style: italic; padding: 2rem; text-align: center; }
    .tag {
      display: inline-block; padding: 0.125rem 0.5rem;
      border-radius: 4px; font-size: 0.75rem; font-weight: 500;
    }
    .tag-block { background: rgba(239,68,68,0.15); color: #ef4444; }
    .tag-approval { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .tag-success { background: rgba(34,197,94,0.15); color: #22c55e; }
    .tag-error { background: rgba(239,68,68,0.15); color: #ef4444; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>Anqush</h1>
        <div class="metric-label">Runtime Control Plane</div>
      </div>
      <div class="badge">v0.1.0</div>
    </header>

    <div class="grid" id="metrics">
      <div class="card">
        <h2>Active Agents</h2>
        <div class="metric" id="agent-count">—</div>
        <div class="metric-label">registered with controls</div>
      </div>
      <div class="card">
        <h2>Pending Approvals</h2>
        <div class="metric" id="pending-count">—</div>
        <div class="metric-label">awaiting human review</div>
      </div>
      <div class="card">
        <h2>Actions Today</h2>
        <div class="metric" id="action-count">—</div>
        <div class="metric-label">tool calls logged</div>
      </div>
      <div class="card">
        <h2>Blocked Actions</h2>
        <div class="metric" id="blocked-count">—</div>
        <div class="metric-label">by runtime rules</div>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <h2>Pending Approvals</h2>
      </div>
      <div id="approvals-list">
        <div class="empty">Loading...</div>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <h2>Recent Audit Log</h2>
      </div>
      <div id="audit-list">
        <div class="empty">Loading...</div>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <h2>Agents</h2>
      </div>
      <div id="agents-list">
        <div class="empty">Loading...</div>
      </div>
    </div>
  </div>

  <script>
    const API = 'http://localhost:8000';

    async function fetchJSON(path) {
      const res = await fetch(API + path);
      return res.ok ? res.json() : [];
    }

    async function loadMetrics() {
      const agents = await fetchJSON('/api/agents');
      const approvals = await fetchJSON('/api/approvals?status=pending');
      const audit = await fetchJSON('/api/audit?limit=200');

      document.getElementById('agent-count').textContent = agents.length;
      document.getElementById('pending-count').textContent = approvals.length;
      document.getElementById('action-count').textContent = audit.length;
      document.getElementById('blocked-count').textContent = audit.filter(e => e.status === 'blocked').length;
    }

    async function loadApprovals() {
      const approvals = await fetchJSON('/api/approvals?status=pending');
      const el = document.getElementById('approvals-list');
      if (!approvals.length) {
        el.innerHTML = '<div class="empty">No pending approvals</div>';
        return;
      }
      el.innerHTML = `
        <table>
          <thead><tr><th>ID</th><th>Agent</th><th>Tool</th><th>Rule</th><th>Params</th><th>Actions</th></tr></thead>
          <tbody>
            ${approvals.map(a => `
              <tr>
                <td class="mono">${a.id}</td>
                <td>${a.agent_id}</td>
                <td class="mono">${a.tool}</td>
                <td><span class="tag tag-approval">${a.rule.name || 'approval'}</span></td>
                <td class="mono">${JSON.stringify(a.params).slice(0, 60)}</td>
                <td>
                  <button class="btn" onclick="resolve('${a.id}', 'approve')">Approve</button>
                  <button class="btn btn-outline" onclick="resolve('${a.id}', 'reject')">Reject</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    async function resolve(id, action) {
      await fetch(`${API}/api/approvals/${id}/${action}`, { method: 'POST' });
      loadApprovals();
      loadMetrics();
    }

    async function loadAudit() {
      const events = await fetchJSON('/api/audit?limit=50');
      const el = document.getElementById('audit-list');
      if (!events.length) {
        el.innerHTML = '<div class="empty">No audit events</div>';
        return;
      }
      el.innerHTML = `
        <table>
          <thead><tr><th>Time</th><th>Agent</th><th>Tool</th><th>Status</th><th>Duration</th></tr></thead>
          <tbody>
            ${events.map(e => `
              <tr>
                <td class="mono">${new Date(e.created_at).toLocaleTimeString()}</td>
                <td>${e.agent_id}</td>
                <td class="mono">${e.tool}</td>
                <td><span class="tag tag-${e.status}">${e.status}</span></td>
                <td>${e.duration_ms ? e.duration_ms.toFixed(0) + 'ms' : '—'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    async function loadAgents() {
      const agents = await fetchJSON('/api/agents');
      const el = document.getElementById('agents-list');
      if (!agents.length) {
        el.innerHTML = '<div class="empty">No agents registered</div>';
        return;
      }
      el.innerHTML = `
        <table>
          <thead><tr><th>ID</th><th>Name</th><th>Session Budget</th><th>Daily Budget</th><th>Created</th></tr></thead>
          <tbody>
            ${agents.map(a => `
              <tr>
                <td class="mono">${a.id}</td>
                <td>${a.name}</td>
                <td>${a.max_session_cost ? '$' + a.max_session_cost : '—'}</td>
                <td>${a.max_daily_cost ? '$' + a.max_daily_cost : '—'}</td>
                <td>${new Date(a.created_at).toLocaleDateString()}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    async function init() {
      await loadMetrics();
      await loadApprovals();
      await loadAudit();
      await loadAgents();
      setInterval(() => { loadMetrics(); loadApprovals(); loadAudit(); }, 5000);
    }

    init();
  </script>
</body>
</html>
